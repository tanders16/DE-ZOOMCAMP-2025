version: 2

models:
  - name: dim_zones
    description: >
      List of unique zones idefied by locationid. 
      Includes the service zone they correspond to (Green or yellow).

  - name: dim_year
    description: >
      List of unique year values exracted from the pickup_datetime from fact_trips.

  - name: dim_month
    description: >
      List of unique month values exracted from the pickup_datetime from fact_trips.

  - name: dim_quarter
    description: >
      List of unique quarter values exracted from the pickup_datetime from fact_trips.

  - name: dim_year_quarter
    description: >
      List of unique year-quarter concatenated values exracted from the pickup_datetime from fact_trips.

  - name: dm_monthly_zone_revenue
    description: >
      Aggregated table of all taxi trips corresponding to both service zones (Green and yellow) per pickup zone, month and service.
      The table contains monthly sums of the fare elements used to calculate the monthly revenue. 
      The table contains also monthly indicators like number of trips, and average trip distance.
    columns:
      - name: revenue_monthly_total_amount
        description: Monthly sum of the the total_amount of the fare charged for the trip per pickup zone, month and service.
        tests:
          - not_null:
              severity: error

  - name: fact_trips
    description: >
      Taxi trips corresponding to both service zones (Green and yellow).
      The table contains records where both pickup and dropoff locations are valid and known zones. 
      Each record corresponds to a trip uniquely identified by tripid.
    columns:
      - name: tripid
        data_type: string
        description: "unique identifier conformed by the combination of vendorid and pickup time"

      - name: vendorid
        data_type: int64
        description: ""

      - name: pickup_month
        data_type: int64
        description: "FK to dim_month"

      - name: pickup_quarter
        data_type: int64
        description: "FK to dim_quarter"

      - name: pickup_year
        data_type: int64
        description: "FK to dim_year"

      - name: pickup_year_quarter
        data_type: string
        description: "FK to dim_year_quarter"

      - name: service_type
        data_type: string
        description: ""

      - name: ratecodeid
        data_type: int64
        description: ""

      - name: pickup_locationid
        data_type: int64
        description: ""

      - name: pickup_borough
        data_type: string
        description: ""

      - name: pickup_zone
        data_type: string
        description: ""

      - name: dropoff_locationid
        data_type: int64
        description: ""

      - name: dropoff_borough
        data_type: string
        description: ""

      - name: dropoff_zone
        data_type: string
        description: ""

      - name: pickup_datetime
        data_type: timestamp
        description: ""

      - name: dropoff_datetime
        data_type: timestamp
        description: ""

      - name: store_and_fwd_flag
        data_type: string
        description: ""

      - name: passenger_count
        data_type: int64
        description: ""

      - name: trip_distance
        data_type: numeric
        description: ""

      - name: trip_type
        data_type: int64
        description: ""

      - name: fare_amount
        data_type: numeric
        description: ""

      - name: extra
        data_type: numeric
        description: ""

      - name: mta_tax
        data_type: numeric
        description: ""

      - name: tip_amount
        data_type: numeric
        description: ""

      - name: tolls_amount
        data_type: numeric
        description: ""

      - name: ehail_fee
        data_type: numeric
        description: ""

      - name: improvement_surcharge
        data_type: numeric
        description: ""

      - name: total_amount
        data_type: numeric
        description: ""

      - name: payment_type
        data_type: int64
        description: ""

      - name: payment_type_description
        data_type: string
        description: ""

  - name: fact_taxi_trips_quarterly_revenue
    description: >
      Year-over-year quarterly revenue filtered to find the best performing quarter and worst performing quarter
      by taxi type (ex: yellow, green).
    columns:
      - name: year
        data_type: int64
        description: ""

      - name: taxi_type
        data_type: string
        description: ""

      - name: best
        data_type: string
        description: "String representation of the best performing year and quarter (YYYY/Qq, 2020/Q1) by revenue"

      - name: worst
        data_type: string
        description: "String representation of the worst performing year and quarter (YYYY/Qq, 2020/Q1) by revenue"

  - name: fact_taxi_trips_monthly_fare
    description: >
      Continuous percentile of fare_amount partitioned by service_type (green, yellow), year and month.
      Data retained for p90, p95, and p97.
    columns:
      - name: taxi_type
        data_type: string
        description: ""

      - name: month
        data_type: int64
        description: ""

      - name: year
        data_type: int64
        description: ""

      - name: p97_fare_amt
        data_type: numeric
        description: ""

      - name: p95_fare_amt
        data_type: numeric
        description: ""

      - name: p90_fare_amt
        data_type: numeric
        description: ""

  - name: dim_fhv_trips
    description: >
      Fair Hired Vehicles trips
    columns:
      - name: service_type
        data_type: string
        description: ""

      - name: dispatching_base_num
        data_type: string
        description: ""

      - name: pickup_month
        data_type: int64
        description: "FK to dim_month"

      - name: pickup_quarter
        data_type: int64
        description: "FK to dim_quarter"

      - name: pickup_year
        data_type: int64
        description: "FK to dim_year"

      - name: pickup_year_quarter
        data_type: string
        description: "FK to dim_year_quarter"

      - name: pickup_datetime
        data_type: timestamp
        description: ""

      - name: dropoff_datetime
        data_type: timestamp
        description: ""

      - name: pickup_locationid
        data_type: int64
        description: ""

      - name: dropoff_locationid
        data_type: int64
        description: ""

      - name: pickup_borough
        data_type: string
        description: ""

      - name: pickup_zone
        data_type: string
        description: ""

      - name: dropoff_borough
        data_type: string
        description: ""

      - name: dropoff_zone
        data_type: string
        description: ""

      - name: sr_flag
        data_type: string
        description: ""

      - name: affiliated_base_num
        data_type: string
        description: ""

  - name: fact_fhv_monthly_zone_traveltime__p90
    description: >
      Monthly aggregation of travel time (trip duration) of Fair Hired Vehicles trips.
    columns:
      - name: pickup_year
        data_type: int64
        description: ""

    columns:
      - name: pickup_month
        data_type: int64
        description: ""

    columns:
      - name: pickup_locationid
        data_type: int64
        description: ""

    columns:
      - name: pickup_zone
        data_type: string
        description: ""

    columns:
      - name: dropoff_locationid
        data_type: int64
        description: ""

    columns:
      - name: dropoff_zone
        data_type: string
        description: ""

    columns:
      - name: p90_duration
        data_type: numeric
        description: ""
